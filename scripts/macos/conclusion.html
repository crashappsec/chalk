<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chalk installed</title>
<style>
body { font-family: -apple-system, sans-serif; margin: 24px; color: #222; }
h1   { font-size: 18px; margin-bottom: 8px; }
p    { font-size: 13px; line-height: 1.45; }
code { font-family: Menlo, monospace; font-size: 12px; background: #f4f4f4;
       padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
<h1>Chalk installed</h1>
<p>
The <code>chalk</code> command is now available at
<code>/usr/local/bin/chalk</code>. Open a new Terminal window and run
<code>chalk --help</code> to verify the install.
</p>
<p>
To uninstall, remove the binary with
<code>sudo rm /usr/local/bin/chalk</code>.
</p>
</body>
</html>
