<h1>Chalk</h1>
<p>
Chalk attaches metadata to software artifacts so deployments can be tied
back to source code and build provenance. This installer places the
<code>chalk</code> command-line tool in <code>/usr/local/bin/chalk</code>.
</p>
<p>
After installation, run <code>chalk --help</code> to get started, or see
<a href="https://chalkproject.io">chalkproject.io</a> for documentation.
</p>
